<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1455"/>
      <stop offset="100%" stop-color="#080620"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#A78BFA"/>
      <stop offset="60%" stop-color="#C4BFFF"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#6C63FF" stroke-width="1.5" opacity="0.45"/>

  <!-- Sonar arcs — top half of circles centered at (50, 52), sweep counter-clockwise to show top half -->
  <path d="M 18 52 A 32 32 0 0 0 82 52" fill="none" stroke="#6C63FF" stroke-width="1"   opacity="0.18"/>
  <path d="M 26 52 A 24 24 0 0 0 74 52" fill="none" stroke="#7C74FF" stroke-width="1.2" opacity="0.30"/>
  <path d="M 34 52 A 16 16 0 0 0 66 52" fill="none" stroke="#8B83FF" stroke-width="1.5" opacity="0.48"/>
  <path d="M 42 52 A  8  8 0 0 0 58 52" fill="none" stroke="#A78BFA" stroke-width="2"   opacity="0.72"/>

  <!-- Center detection point -->
  <circle cx="50" cy="52" r="9" fill="#6C63FF" opacity="0.14"/>
  <circle cx="50" cy="52" r="3.5" fill="#D4CCFF" filter="url(#glow)"/>

  <!-- Waveform — midline y=74, peaks at y=58 toward the detection dot -->
  <path d="M 6 74 L 14 74
           C 17 74 20 66 23 66
           C 26 66 29 74 32 74
           C 34 74 37 63 42 59
           C 45 56 47 55 50 55
           C 53 55 55 56 58 59
           C 63 63 66 74 68 74
           C 71 74 74 66 77 66
           C 80 66 83 74 86 74
           L 94 74"
        fill="none"
        stroke="url(#wg)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
